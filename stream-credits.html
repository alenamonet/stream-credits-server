<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stream Credits</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    color: #fff;
  }

  /* ── Loading state ────────────────────────────────────── */
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  /* ── Stage with fade mask ─────────────────────────────── */
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.8s ease;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
  }

  #stage.visible { opacity: 1; }

  /* ── Scrolling reel ───────────────────────────────────── */
  #reel {
    width: 820px;
    padding-top: 100vh;
    padding-bottom: 100vh;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    will-change: transform;
  }

  /* ── Opening ──────────────────────────────────────────── */
  .opening {
    text-align: center;
    margin-bottom: 40px;
    padding: 0 40px;
  }

  .opening .thanks {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
  }

  .opening-heart {
    font-size: 1rem;
    color: #fff;
    margin-top: 24px;
    text-align: center;
  }

  /* ── Section ──────────────────────────────────────────── */
  .section {
    margin-bottom: 80px;
    padding: 0 40px;
  }

  .section-title {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    color: #fff;
    margin-bottom: 40px;
  }

  /* ── Featured list (one name per row, centered) ───────── */
  .featured-list {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .feat-name {
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: lowercase;
    color: #fff;
    text-align: center;
  }

  /* ── Grid list (3 columns) ────────────────────────────── */
  .grid-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px 20px;
    text-align: center;
  }

  .grid-name {
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: lowercase;
    color: #fff;
    line-height: 1.4;
  }

  /* ── End card ─────────────────────────────────────────── */
  .end-card {
    text-align: center;
    margin-top: 20px;
    padding: 0 40px 60px;
  }

  .end-card .end-line {
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #fff;
  }
</style>
</head>
<body>

<div id="loading">Loading credits…</div>

<div id="stage">
  <div id="reel"></div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────
const SERVER_URL  = 'https://stream-credits-server.onrender.com';
const SCROLL_SPEED = 45;   // pixels per second — adjust if needed
const START_DELAY  = 2000; // ms pause before scrolling begins

// ── Fetch live data then build and roll ────────────────────────
async function init() {
  let data = {};

  try {
    const res = await fetch(`${SERVER_URL}/api/stream-credits`);
    data = await res.json();
  } catch (err) {
    console.error('Could not reach credits server:', err);
    // Still build the reel — sections will just be empty
  }

  const {
    youtubeSuperchats    = [],
    youtubeSuperStickers = [],
    youtubeMembers       = [],
    seSponsors           = [],
    twitchSubscribers    = []
  } = data;

  // Only include sections that actually have names
  const sections = [
    { title: 'YouTube Super Chatters',     type: 'featured', names: youtubeSuperchats    },
    { title: 'YouTube Sticker Supporters', type: 'featured', names: youtubeSuperStickers },
    { title: 'YouTube Members',            type: 'grid',     names: youtubeMembers       },
    { title: 'StreamElements Donors',      type: 'featured', names: seSponsors           },
    { title: 'Twitch Subscribers',         type: 'grid',     names: twitchSubscribers    }
  ].filter(s => s.names.length > 0);

  buildReel(sections);
}

// ── Build the DOM ──────────────────────────────────────────────
function buildReel(sections) {
  const reel = document.getElementById('reel');
  reel.innerHTML = '';

  // Opening
  const opening = document.createElement('div');
  opening.className = 'opening';
  opening.innerHTML = `
    <div class="thanks">Thank You For Watching</div>
    <div class="opening-heart">♥</div>
  `;
  reel.appendChild(opening);

  // Sections
  sections.forEach(sec => {
    const section = document.createElement('div');
    section.className = 'section';

    const titleEl = document.createElement('div');
    titleEl.className = 'section-title';
    titleEl.textContent = sec.title;
    section.appendChild(titleEl);

    if (sec.type === 'featured') {
      const list = document.createElement('div');
      list.className = 'featured-list';
      sec.names.forEach(name => {
        const el = document.createElement('div');
        el.className = 'feat-name';
        el.textContent = name;
        list.appendChild(el);
      });
      section.appendChild(list);

    } else {
      const grid = document.createElement('div');
      grid.className = 'grid-list';
      sec.names.forEach(name => {
        const el = document.createElement('div');
        el.className = 'grid-name';
        el.textContent = name;
        grid.appendChild(el);
      });
      section.appendChild(grid);
    }

    reel.appendChild(section);
  });

  // End card
  const endCard = document.createElement('div');
  endCard.className = 'end-card';
  endCard.innerHTML = `<div class="end-line">End of Stream</div>`;
  reel.appendChild(endCard);

  // Hide loading, show reel
  document.getElementById('loading').style.display = 'none';
  const stage = document.getElementById('stage');
  stage.classList.add('visible');

  // Start scrolling after delay
  setTimeout(() => startScroll(reel), START_DELAY);
}

// ── Scroll engine ──────────────────────────────────────────────
function startScroll(reel) {
  let startTime = null;
  let basePos   = 0;
  let rafId     = null;
  let paused    = false;

  function maxScroll() { return reel.scrollHeight - window.innerHeight; }

  function getPos() {
    const t = reel.style.transform;
    if (!t) return 0;
    const m = t.match(/translateY\((-?[\d.]+)px\)/);
    return m ? Math.abs(parseFloat(m[1])) : 0;
  }

  function tick(ts) {
    if (!startTime) startTime = ts;
    const pos = basePos + ((ts - startTime) / 1000) * SCROLL_SPEED;
    const max = maxScroll();
    if (pos >= max) {
      reel.style.transform = `translateY(-${max}px)`;
      return;
    }
    reel.style.transform = `translateY(-${pos}px)`;
    rafId = requestAnimationFrame(tick);
  }

  // Click anywhere to pause / resume
  document.addEventListener('click', () => {
    if (!paused) {
      cancelAnimationFrame(rafId);
      rafId = null;
      basePos = getPos();
      startTime = null;
      paused = true;
    } else {
      paused = false;
      rafId = requestAnimationFrame(tick);
    }
  });

  rafId = requestAnimationFrame(tick);
}

// ── Go ─────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
