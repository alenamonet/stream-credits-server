<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stream Credits</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    width: 1920px;
    height: 1080px;
    font-family: 'Poppins', sans-serif;
    text-align: center;
  }

  #credits-container {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  #credits-scroll {
    position: absolute;
    width: 100%;
    padding-top: 1100px;
  }

  #credits-scroll.animate {
    animation: scrollUp var(--duration) linear forwards;
  }

  @keyframes scrollUp {
    0%   { transform: translateY(0); }
    100% { transform: translateY(calc(-100% - 200px)); }
  }

  /* Opening title */
  .title {
    font-size: 56px;
    font-weight: 700;
    color: #c9a96e;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 80px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  /* Each section row: label left, names right */
  .section {
    display: flex;
    align-items: flex-start;
    width: 1100px;
    margin: 0 auto 56px;
    gap: 48px;
  }

  .section-label {
    font-size: 26px;
    font-weight: 700;
    color: #c9a96e;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    min-width: 420px;
    text-align: right;
    padding-top: 4px;
    line-height: 1.4;
  }

  .section-names {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }

  .name-item {
    font-size: 30px;
    font-weight: 300;
    color: #ffffff;
    letter-spacing: 2px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    line-height: 1.4;
  }

  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ffffff;
    font-size: 28px;
    font-weight: 600;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>

<div id="loading">Loading credits...</div>
<div id="credits-container">
  <div id="credits-scroll"></div>
</div>

<script>
const RENDER_API = 'https://stream-credits-server.onrender.com/api/stream-credits';
const SCROLL_SPEED_PER_NAME = 1.0;
const SCROLL_MIN = 50;
const SCROLL_MAX = 150;

function buildSection(label, names) {
  if (!names || names.length === 0) return '';
  const nameItems = names.map(n => `<div class="name-item">${n}</div>`).join('');
  return `
    <div class="section">
      <div class="section-label">${label}</div>
      <div class="section-names">${nameItems}</div>
    </div>
  `;
}

async function loadCredits() {
  try {
    const res = await fetch(RENDER_API);
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';

    const {
      youtubeMembers = [],
      youtubeSuperchats = [],
      youtubeSuperStickers = [],
      seSponsors = [],
      twitchSubscribers = [],
      mods = []
    } = data;

    const totalNames = youtubeMembers.length + youtubeSuperchats.length +
      youtubeSuperStickers.length + seSponsors.length + twitchSubscribers.length;

    const duration = Math.min(SCROLL_MAX, Math.max(SCROLL_MIN, totalNames * SCROLL_SPEED_PER_NAME + 30));
    document.documentElement.style.setProperty('--duration', `${duration}s`);

    const html = `
      <div class="title">Thank you for watching!</div>
      ${buildSection("Today's Supporters", seSponsors)}
      ${buildSection("Today's Super Chats", youtubeSuperchats)}
      ${buildSection("Today's Super Stickers", youtubeSuperStickers)}
      ${buildSection("YouTube Members", youtubeMembers)}
      ${buildSection("Twitch Subscribers", twitchSubscribers)}
      ${mods.length ? buildSection("Mod Gods", mods) : ''}
    `;

    const scroll = document.getElementById('credits-scroll');
    scroll.innerHTML = html;
    setTimeout(() => scroll.classList.add('animate'), 1000);

  } catch (err) {
    document.getElementById('loading').textContent = 'Could not load credits — check server';
    console.error(err);
  }
}

loadCredits();
</script>
</body>
</html>
